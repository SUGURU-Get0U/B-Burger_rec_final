{% extends "base.html" %}
{% block conteudo %}
<h2>Clientes</h2>
<a href="{{ url_for('admin.novo_cliente') }}">+ Novo Cliente</a>

<table class="tabela">
  <thead>
    <tr>
      <th>Nome</th>
      <th>E-mail</th>
      <th></th>
    </tr>
  </thead>
  <tbody>
    {% for cliente in clientes %}
    <tr>
      <td>{{ cliente.nome }}</td>
      <td>{{ cliente.email }}</td>
      <td>
        <a href="{{ url_for('admin.editar_cliente', id=cliente.id) }}">Editar</a>
        <form method="POST" action="{{ url_for('admin.remover_cliente', id=cliente.id) }}"
              class="form-inline ml-1">
          <button type="submit" class="btn-perigo"
                  onclick="return confirm('Remover cliente?')">Remover</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
