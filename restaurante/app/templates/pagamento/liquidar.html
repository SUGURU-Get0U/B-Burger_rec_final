{% extends "base.html" %}
{% block conteudo %}
<h2>Liquidar Comanda #{{ comanda.codigo }}</h2>

<p>Total a pagar: <strong>R$ {{ "%.2f"|format(comanda.total) }}</strong></p>

<form method="POST" action="{{ url_for('pagamento.liquidar', comanda_id=comanda.id) }}">
  <div class="campo">
    <label>Forma de pagamento</label>
    <select name="forma_pagamento" class="input">
      <option value="dinheiro">Dinheiro</option>
      <option value="cartao_debito">Cartão de Débito</option>
      <option value="cartao_credito">Cartão de Crédito</option>
      <option value="pix">PIX</option>
    </select>
  </div>
  <div class="campo">
    <label>Valor recebido (R$)</label>
    <input type="number" name="valor_recebido" step="0.01" min="0" class="input" required>
  </div>
  <button type="submit" class="btn btn-sucesso">
    Confirmar Pagamento
  </button>
  <a href="{{ url_for('comanda.detalhe', id=comanda.id) }}" class="ml-2">Cancelar</a>
</form>
{% endblock %}
